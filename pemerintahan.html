<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presiden dan Presiden Sementara</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            text-align: center;
            background: #f4f4f4;
        }

        .gallery {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
        }

        .card {
            width: 200px;
            padding: 10px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        img:hover {
            transform: scale(1.05);
        }

        h3 {
            font-family: 'Times New Roman', Times, serif;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <h1>Daftar Pemimpin Indonesia</h1>
    <div class="gallery">
        <div class="card">
            <a href="sukarno.html"><img src="img/sukarno.jpeg" alt="Sukarno"></a>
            <h3>Ir. Sukarno</h3>
        </div>
        <div class="card">
            <a href="sjafruddin.html"><img src="img/sjafruddin.jpeg" alt="Sjafruddin"></a>
            <h3>Sjafruddin</h3>
        </div>
        <div class="card">
            <a href="assaat.html"><img src="img/assaat.jpeg" alt="Assaat"></a>
            <h3>Mr. Assaat</h3>
        </div>
        <div class="card">
            <a href="soeharto.html"><img src="img/soeharto.jpeg" alt="Soeharto"></a>
            <h3>Soeharto</h3>
        </div>
    </div>
</body>

</html>
